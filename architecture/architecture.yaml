guidance: |
  Before making code changes, read the relevant container YAML.
  After changes, update ownership and dependencies if they changed.
  The broker is a dumb pipe with state — it knows WHO is connected and WHERE
  messages go, but has zero knowledge of prompts, LLMs, or what agents do.

system:
  name: agent-broker
  description: Lightweight agent message broker — identity, presence, and message routing for AI agents across projects.
  ignore:
    - "target/**"
    - "tests/**"

containers:
  - id: api
    path: broker/src/api
    description: HTTP + WebSocket API layer — routes, request/response types, WS handlers
    depends_on: [broker, db, identity, stanza]

  - id: broker
    path: broker/src/broker
    description: Core broker logic — agent state, presence, delivery engine, channel routing
    depends_on: [db]

  - id: db
    path: broker/src/db
    description: SQLite persistence — schema, repository pattern for all data access
    depends_on: [identity]

  - id: identity
    path: broker/src/identity
    description: Authentication primitives — key hashing, verification
    depends_on: []

  - id: stanza
    path: broker/src/stanza
    description: XML stanza parser — extracts routing headers (from, to, type), preserves raw XML
    depends_on: []

  - id: mcp
    path: mcp/src
    description: MCP server (stdio) — exposes broker tools for AI agents (register, presence, send, peek, messages)
    depends_on: []

rules:
  - id: db-independence
    type: no_dependency
    from: db
    to: [api, broker]
    reason: "Database layer must not depend on broker logic or API"

  - id: broker-no-api
    type: no_dependency
    from: broker
    to: api
    reason: "Broker logic must not depend on API layer — API calls broker, not the other way"

  - id: identity-independence
    type: no_dependency
    from: identity
    to: [api, broker, db, stanza]
    reason: "Identity is a leaf module — pure crypto, no dependencies on other layers"

  - id: stanza-independence
    type: no_dependency
    from: stanza
    to: [api, broker, db, identity]
    reason: "Stanza parser is a leaf module — pure parsing, no dependencies on other layers"

  - id: session-independence
    type: no_dependency
    from: mcp/session
    to: [api, broker, db, stanza, identity]
    reason: "SessionManager is a leaf — pure FS + in-memory state, no broker dependencies"
