# broker — Core broker logic: agent state, presence tracking, delivery engine
# Source: src/broker

modules:
  - id: state
    file: mod.rs
    files:
      - state.rs
      - dispatch.rs
    owns: [agent-sessions, presence-tracking, agent-discovery, channel-broadcast, stanza-dispatch]
    boundary: "In-memory state + DB sync — no HTTP/WS concerns"
    depends_on: [db/db, stanza/types, stanza/parser]

  - id: delivery
    file: delivery.rs
    owns: [message-delivery, store-and-forward, pending-drain]
    boundary: "Delivery decisions only — no connection management"
    depends_on: [db/db, stanza/types]

